<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Mensal Executivo COI</title>
<style>
:root{--bg:#eef3f7;--card:#fff;--text:#122033;--muted:#64748b;--primary:#0f766e;--dark:#134e4a;--border:#dbe3ea;--shadow:0 8px 24px rgba(15,23,42,.08);--red:#dc2626;--yellow:#d97706;--green:#16a34a;--blue:#2563eb}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:15px}.shell{max-width:1500px;margin:0 auto;padding:24px 34px}.hero{background:linear-gradient(135deg,#0f766e,#134e4a);color:white;border-radius:22px;padding:28px 32px;margin-bottom:18px;box-shadow:var(--shadow)}.hero h1{margin:0 0 8px;font-size:34px}.hero p{margin:0;color:#d1fae5}.toolbar,.note,.card,.metric,.panel,.area-panel,.delivery-card{background:white;border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}.toolbar label{font-weight:bold;color:#334155}.toolbar select{border:1px solid var(--border);border-radius:10px;background:#fff;padding:10px 12px;color:var(--text);font-weight:bold}.btn{border:0;border-radius:999px;padding:11px 16px;background:var(--primary);color:#fff;text-decoration:none;font-weight:bold;cursor:pointer}.btn.secondary{background:#fff;color:var(--primary);border:1px solid var(--primary)}.note{background:#ecfeff;color:#164e63;margin-bottom:22px;line-height:1.5}.section{margin:30px 0}.section h2{font-size:24px;margin:0 0 16px}.metrics{display:grid;grid-template-columns:repeat(6,minmax(145px,1fr));gap:14px}.metric{min-height:82px}.metric span{display:block;color:var(--muted);font-size:12px;margin-bottom:8px}.metric strong{font-size:30px;line-height:1}.front-grid,.delivery-grid{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:16px}.area-panel{padding:20px}.area-panel h3,.delivery-card h3{margin:0 0 12px}.area-panel{border-top:6px solid var(--primary)}.delivery-card{border-top:6px solid var(--blue)}.item{border-top:1px solid var(--border);padding-top:10px;margin-top:10px;line-height:1.4}.item:first-child{border-top:0;padding-top:0}.meta{color:var(--muted);font-size:13px;line-height:1.45;margin-top:5px}.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;margin:4px 4px 4px 0}.ok{background:#dcfce7;color:var(--green)}.status{background:#e0f2fe;color:#0369a1}.warn{background:#fef3c7;color:var(--yellow)}.empty{color:var(--muted);font-style:italic}.tablewrap{overflow:auto;background:white;border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border)}table{width:100%;border-collapse:collapse;min-width:850px}th,td{border-bottom:1px solid var(--border);padding:12px;text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc;color:#334155;font-size:12px;text-transform:uppercase}.footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}@media(max-width:1000px){.metrics{grid-template-columns:repeat(3,1fr)}.front-grid,.delivery-grid{grid-template-columns:1fr}}@media(max-width:650px){.shell{padding:14px}.hero h1{font-size:25px}.metrics{grid-template-columns:1fr}.toolbar{align-items:stretch}.toolbar select,.btn{width:100%;text-align:center}}@media print{body{background:white}.shell{max-width:none;padding:0}.toolbar,.footer{display:none}.hero,.note,.card,.metric,.panel,.area-panel,.delivery-card,.tablewrap{box-shadow:none}.hero{border-radius:0}.metrics{grid-template-columns:repeat(3,1fr)}.front-grid,.delivery-grid{grid-template-columns:repeat(3,1fr)}.section{break-inside:avoid}.area-panel,.delivery-card{break-inside:avoid}@page{size:A4 landscape;margin:10mm}}
</style>
</head>
<body>
<main class="shell">
<header class="hero">
<h1>Relatório Mensal Executivo COI</h1>
<p>Consolidação mensal de atividades, resultados, pendências e próximas entregas para reporte à diretoria.</p>
</header>
<div class="toolbar">
<label for="competencia">Competência:</label>
<select id="competencia" aria-label="Competência mensal"></select>
<button class="btn" type="button" onclick="window.print()">Imprimir / Salvar em PDF</button>
<a class="btn secondary" href="index.html">Voltar ao Painel</a>
</div>
<div id="app" class="note">Carregando dados...</div>
<footer class="footer">Painel Executivo COI - relatório mensal gerado a partir da base oficial do painel.</footer>
</main>
<script>
var DATA=null;
var FRENTES=['CENTRAL DF','CENTRAL DE ATENDIMENTO','MDS'];
function texto(v){return v===undefined||v===null?'':String(v)}
function safe(v){return texto(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function badge(txt,cls){return txt?'<span class="badge '+cls+'">'+safe(txt)+'</span>':''}
function vazio(txt){return '<p class="empty">'+safe(txt||'Sem registros para a competência selecionada.')+'</p>'}
function mesDeData(v){var m=texto(v).match(/(\d{2})\/(\d{2})\/(\d{4})/);return m?(m[2]==='01'?'Janeiro':m[2]==='02'?'Fevereiro':m[2]==='03'?'Março':m[2]==='04'?'Abril':m[2]==='05'?'Maio':m[2]==='06'?'Junho':m[2]==='07'?'Julho':m[2]==='08'?'Agosto':m[2]==='09'?'Setembro':m[2]==='10'?'Outubro':m[2]==='11'?'Novembro':'Dezembro')+'/'+m[3]:''}
function pertenceMes(v,mes){return texto(v).includes(mes)||mesDeData(v)===mes}
function frenteDoProjeto(nome){var projeto=(DATA.projetos||[]).find(function(p){return texto(nome).includes(p.nome)||p.nome.includes(texto(nome))});if(projeto&&FRENTES.includes(projeto.area))return projeto.area;var upper=texto(nome).toUpperCase();return FRENTES.find(function(f){return upper.includes(f)})||'OUTROS'}
function metric(nome,valor){return '<div class="metric"><span>'+safe(nome)+'</span><strong>'+safe(valor)+'</strong></div>'}
function listaItens(arr,render){return arr.length?arr.map(render).join(''):vazio()}
function mesesDisponiveis(data){var meses=[];(data.competencias||[]).forEach(function(x){meses.push(x.mes)});(data.tarefasConcluidas||[]).forEach(function(x){meses.push(x.mes||mesDeData(x.data))});return Array.from(new Set(meses.filter(Boolean)))}
function renderAtividades(tarefas){var grupos={};FRENTES.concat(['OUTROS']).forEach(function(f){grupos[f]=[]});tarefas.forEach(function(t){grupos[frenteDoProjeto(t.projeto)].push(t)});var frentes=FRENTES.concat(grupos.OUTROS.length?['OUTROS']:[]);return '<div class="front-grid">'+frentes.map(function(frente){return '<article class="area-panel"><h3>'+safe(frente==='OUTROS'?'OUTRAS ATIVIDADES':frente)+'</h3>'+listaItens(grupos[frente],function(t){return '<div class="item"><b>'+safe(t.tarefa)+'</b><div class="meta">'+safe(t.data)+'<br>'+safe(t.projeto)+'<br>Responsável: '+safe(t.responsavel)+'</div>'+badge(t.status,'ok')+'</div>'})+'</article>'}).join('')+'</div>'}
function renderDemandas(arr){return listaItens(arr,function(x){return '<div class="item"><b>'+safe(x.titulo)+'</b><div class="meta">'+safe(x.periodo)+'<br>'+safe(x.projeto)+'<br>Responsável: '+safe(x.responsavel)+'</div><div>'+safe(x.resultado)+'</div>'+badge(x.status,'ok')+'</div>'})}
function renderIncidentes(arr){return listaItens(arr,function(x){return '<div class="item"><b>'+safe(x.titulo)+'</b><div class="meta">'+safe(x.sistema)+' | Abertura: '+safe(x.abertura)+(x.encerramento?' | Encerramento: '+safe(x.encerramento):'')+'<br>Responsável: '+safe(x.responsavel)+'</div><div>'+safe(x.resultado||x.causa||'')+'</div>'+badge(x.status,x.status==='Concluído'?'ok':'warn')+'</div>'})}
function renderTabela(rows){return '<div class="tablewrap"><table><thead><tr><th>Prazo</th><th>Entrega / Pendência</th><th>Projeto</th><th>Responsável</th><th>Status</th></tr></thead><tbody>'+rows.map(function(x){return '<tr><td>'+safe(x.prazo||x.data||'A definir')+'</td><td>'+safe(x.pendencia||x.entrega||x.acao)+'</td><td>'+safe(x.projeto)+'</td><td>'+safe(x.responsavel)+'</td><td>'+badge(x.status,'status')+'</td></tr>'}).join('')+'</tbody></table></div>'}
function render(mes){var tarefas=(DATA.tarefasConcluidas||[]).filter(function(x){return x.mes===mes||pertenceMes(x.data,mes)});var demandas=(DATA.demandasConcluidas||[]).filter(function(x){return pertenceMes(x.periodo,mes)});var incidentes=(DATA.incidentes||[]).filter(function(x){return pertenceMes(x.abertura,mes)||pertenceMes(x.encerramento,mes)});var competencia=(DATA.competencias||[]).find(function(x){return x.mes===mes})||{};var pendencias=DATA.pendencias||[];var proximas=(DATA.proximasEntregas&&DATA.proximasEntregas.proximos15Dias)||[];var resumo=(competencia.atividades||[]);var html='<div class="note"><b>Competência:</b> '+safe(mes)+' &nbsp; | &nbsp; <b>Base atualizada em:</b> '+safe(DATA.ultimaAtualizacao)+'<br><b>Resumo executivo:</b> '+safe(resumo.length?resumo.length+' atividade(s) executada(s) ou acompanhada(s) na competência.':'Sem resumo executivo registrado para a competência.')+'</div>';html+='<section class="section"><h2>Indicadores da Competência</h2><div class="metrics">'+metric('Atividades realizadas',tarefas.length)+metric('Registros executivos',resumo.length)+metric('Demandas concluídas',demandas.length)+metric('Incidentes tratados',incidentes.length)+metric('Pendências abertas',pendencias.length)+metric('Próximas entregas',proximas.length)+'</div></section>';html+='<section class="section"><h2>Atividades Realizadas por Frente</h2>'+renderAtividades(tarefas)+'</section>';html+='<section class="section"><h2>Resumo Executivo da Competência</h2><article class="panel">'+listaItens(resumo,function(x){return '<div class="item">'+safe(x)+'</div>'})+'</article></section>';html+='<section class="section"><h2>Demandas e Incidentes Tratados</h2><div class="delivery-grid"><article class="delivery-card"><h3>Demandas Concluídas</h3>'+renderDemandas(demandas)+'</article><article class="delivery-card"><h3>Incidentes</h3>'+renderIncidentes(incidentes)+'</article><article class="delivery-card"><h3>Notas para Diretoria</h3><p class="meta">Utilize este bloco como apoio ao reporte: destaque avanços, riscos e decisões necessárias a partir das informações consolidadas abaixo.</p>'+listaItens(resumo.slice(0,3),function(x){return '<div class="item">'+safe(x)+'</div>'})+'</article></div></section>';html+='<section class="section"><h2>Pendências Executivas</h2>'+renderTabela(pendencias)+'</section>';html+='<section class="section"><h2>Próximas Entregas</h2>'+renderTabela(proximas)+'</section>';document.getElementById('app').className='';document.getElementById('app').innerHTML=html}
function iniciar(data){DATA=data;var select=document.getElementById('competencia');var meses=mesesDisponiveis(data);select.innerHTML=meses.map(function(m){return '<option value="'+safe(m)+'">'+safe(m)+'</option>'}).join('');select.value=meses.includes('Maio/2026')?'Maio/2026':meses[meses.length-1];select.addEventListener('change',function(){render(select.value)});render(select.value)}
fetch('dados_painel_aura.json?cache='+Date.now()).then(function(r){if(!r.ok)throw new Error('Falha ao carregar JSON');return r.json()}).then(iniciar).catch(function(){document.getElementById('app').innerHTML='Erro ao carregar dados_painel_aura.json'})
</script>
</body>
</html>
