<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Executivo AURA v6.0</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#1f2937}.layout{display:flex}.menu{width:260px;min-height:100vh;background:#0f172a;color:white;padding:18px;position:fixed}.menu h2{font-size:18px;margin:0 0 8px}.menu p{font-size:12px;color:#cbd5e1;margin:0 0 18px}.menu a{display:block;color:#e2e8f0;text-decoration:none;padding:10px;border-radius:10px;margin-bottom:4px}.menu a:hover{background:#1e293b}.main{margin-left:260px;padding:24px;width:100%}.hero{background:linear-gradient(135deg,#0f766e,#134e4a);color:white;border-radius:20px;padding:26px;margin-bottom:18px}.hero h1{margin:0 0 8px}.hero p{margin:0;color:#d1fae5}.note,.card,.metric,.panel{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(15,23,42,.06)}.note{background:#ecfeff;color:#164e63}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.metric span{display:block;color:#64748b;font-size:12px}.metric strong{font-size:30px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}.card{border-top:6px solid #0f766e}.card h3{margin:0 0 6px}.meta{color:#64748b;font-size:13px;margin-bottom:8px}.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:bold;margin:4px 4px 4px 0}.alta{background:#fee2e2;color:#dc2626}.media{background:#fef3c7;color:#d97706}.status{background:#e0f2fe;color:#0369a1}.ok{background:#dcfce7;color:#16a34a}ul{padding-left:18px}li{margin:6px 0}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid #e5e7eb;padding:10px;text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc}.tablewrap{overflow:auto}.section{margin:28px 0}.print{position:fixed;right:18px;bottom:18px;background:#0f766e;color:white;border:0;border-radius:999px;padding:12px 16px;font-weight:bold}@media(max-width:850px){.menu{position:relative;width:100%;min-height:auto}.layout{display:block}.main{margin-left:0;padding:14px}.menu a{display:inline-block}}
</style>
</head>
<body>
<div class="layout">
<nav class="menu">
<h2>Painel AURA v6.0</h2>
<p>Leitura automática do JSON</p>
<a href="#dashboard">Dashboard</a>
<a href="#competencias">Execução Mensal</a>
<a href="#projetos">Projetos</a>
<a href="#demandas">Demandas Concluídas</a>
<a href="#incidentes">Incidentes</a>
<a href="#pendencias">Pendências</a>
<a href="#minhas">Minhas Entregas</a>
</nav>
<main class="main">
<header class="hero"><h1>Painel Executivo AURA</h1><p>Gestão mensal de execução com dados carregados do arquivo dados_painel_aura.json.</p></header>
<div id="app" class="note">Carregando dados...</div>
</main>
</div>
<button class="print" onclick="window.print()">Imprimir / PDF</button>
<script>
function texto(v){return v===undefined||v===null?'':String(v)}
function safe(v){return texto(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function badge(txt,cls){return '<span class="badge '+cls+'">'+safe(txt)+'</span>'}
function prioridade(p){return texto(p).toLowerCase().includes('alta')?'alta':'media'}
function lista(arr){return '<ul>'+(arr||[]).map(function(x){return '<li>'+safe(x)+'</li>'}).join('')+'</ul>'}
function metric(nome,valor){return '<div class="metric"><span>'+safe(nome)+'</span><strong>'+safe(valor||0)+'</strong></div>'}
function render(data){
var d=data.dashboard||{};
var html='';
html+='<div class="note"><b>Última atualização:</b> '+safe(data.ultimaAtualizacao)+' | <b>Versão:</b> '+safe(data.versao)+'<br>'+safe(data.projetoBase||'')+(data.observacao?'<br><b>Observação:</b> '+safe(data.observacao):'')+'</div>';
html+='<section id="dashboard" class="section"><h2>Dashboard</h2><div class="metrics">'+metric('Projetos ativos',d.projetosAtivos)+metric('Atividades concluídas no mês',d.atividadesConcluidasMes)+metric('Demandas concluídas',d.demandasConcluidas)+metric('Incidentes abertos',d.incidentesAbertos)+metric('Pendências executivas',d.pendenciasExecutivas)+metric('Entregas próximas',d.entregasProximas)+'</div></section>';
html+='<section id="competencias" class="section"><h2>Execução Mensal</h2><div class="grid">'+(data.competencias||[]).map(function(c){return '<article class="panel"><h3>'+safe(c.mes)+' - '+safe(c.status)+'</h3>'+lista(c.atividades)+'</article>'}).join('')+'</div></section>';
html+='<section id="projetos" class="section"><h2>Projetos e Demandas em Andamento</h2><div class="grid">'+(data.projetos||[]).map(function(p){return '<article class="card"><h3>'+safe(p.nome)+'</h3><div class="meta">Responsável: '+safe(p.responsavel)+(p.alinhamento?' | Alinhamento: '+safe(p.alinhamento):'')+(p.inicio?' | Início: '+safe(p.inicio):'')+(p.previsaoConclusao?' | Previsão: '+safe(p.previsaoConclusao):'')+'</div><p>'+safe(p.objetivo||p.area||'')+'</p>'+badge(p.prioridade,prioridade(p.prioridade))+badge(p.status,'status')+badge(p.competencia||'', 'status')+lista(p.atividades)+'</article>'}).join('')+'</div></section>';
html+='<section id="demandas" class="section"><h2>Demandas Concluídas</h2><div class="grid">'+(data.demandasConcluidas||[]).map(function(x){return '<article class="card"><h3>'+safe(x.titulo)+'</h3><div class="meta">Responsável: '+safe(x.responsavel)+' | Período: '+safe(x.periodo)+'</div><p>'+safe(x.resultado)+'</p>'+badge(x.status,'ok')+badge(x.categoria,'status')+'</article>'}).join('')+'</div></section>';
html+='<section id="incidentes" class="section"><h2>Incidentes</h2><div class="grid">'+(data.incidentes||[]).map(function(x){return '<article class="card"><h3>'+safe(x.titulo)+'</h3><div class="meta">Sistema: '+safe(x.sistema)+' | Responsável: '+safe(x.responsavel)+' | Abertura: '+safe(x.abertura)+'</div>'+badge(x.prioridade,prioridade(x.prioridade))+badge(x.status,'status')+'</article>'}).join('')+'</div></section>';
html+='<section id="pendencias" class="section"><h2>Pendências Executivas</h2><div class="tablewrap"><table><thead><tr><th>Prazo</th><th>Pendência</th><th>Projeto</th><th>Responsável</th><th>Status</th></tr></thead><tbody>'+(data.pendencias||[]).map(function(x){return '<tr><td>'+safe(x.prazo)+'</td><td>'+safe(x.pendencia)+'</td><td>'+safe(x.projeto)+'</td><td>'+safe(x.responsavel)+'</td><td>'+safe(x.status)+'</td></tr>'}).join('')+'</tbody></table></div></section>';
var minhas=(data.projetos||[]).filter(function(p){return texto(p.responsavel).includes(data.responsavelPrincipal)});
html+='<section id="minhas" class="section"><h2>Minhas Entregas - '+safe(data.responsavelPrincipal)+'</h2><div class="grid">'+minhas.map(function(p){return '<article class="card"><h3>'+safe(p.nome)+'</h3><div class="meta">'+safe(p.status)+' | '+safe(p.competencia)+'</div>'+lista(p.atividades)+'</article>'}).join('')+'</div></section>';
document.getElementById('app').className='';document.getElementById('app').innerHTML=html;
}
fetch('dados_painel_aura.json').then(function(r){return r.json()}).then(render).catch(function(){document.getElementById('app').innerHTML='Erro ao carregar dados_painel_aura.json';});
</script>
</body>
</html>
